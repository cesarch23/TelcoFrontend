<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Error Message -->
        <div class="error-message" *ngIf="error">
          {{ error }}
        </div>

        <!-- Username Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input
            matInput
            type="email"
            formControlName="username"
            placeholder="backoffice.juan@gmail.com"
            [disabled]="loading"
          />
          <mat-error *ngIf="f['username'].hasError('required')">
            El email es requerido
          </mat-error>
          <mat-error *ngIf="f['username'].hasError('email')">
            Ingrese un email válido
          </mat-error>
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            placeholder="••••••••"
            [disabled]="loading"
          />
          <mat-error *ngIf="f['password'].hasError('required')">
            La contraseña es requerida
          </mat-error>
          <mat-error *ngIf="f['password'].hasError('minlength')">
            La contraseña debe tener mínimo 8 caracteres
          </mat-error>
        </mat-form-field>

        <!-- Submit Button -->
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width submit-button"
          [disabled]="loading"
        >
          <span *ngIf="!loading">Iniciar Sesión</span>
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
